name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: ""
            cc: gcc
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: ""
            cc: aarch64-linux-gnu-gcc
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            suffix: ".exe"
            cc: x86_64-w64-mingw32-gcc
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: ""
            cc: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Install cross-compilers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-aarch64-linux-gnu

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build all components
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LDFLAGS="-X main.Version=${VERSION}"
          SUFFIX="${{ matrix.suffix }}"
          OUTDIR="dist/james-${GOOS}-${GOARCH}"
          mkdir -p "${OUTDIR}"

          cd mi6
          go build -ldflags "${LDFLAGS}" -o "../${OUTDIR}/mi6-server${SUFFIX}" ./cmd/mi6-server/
          go build -ldflags "${LDFLAGS}" -o "../${OUTDIR}/mi6-client${SUFFIX}" ./cmd/mi6-client/
          cd ..

          cd moneypenny
          go build -ldflags "${LDFLAGS}" -o "../${OUTDIR}/moneypenny${SUFFIX}" ./cmd/moneypenny/
          cd ..

          cd hem
          go build -ldflags "${LDFLAGS}" -o "../${OUTDIR}/hem${SUFFIX}" ./cmd/hem/
          cd ..

          cd qew
          go build -ldflags "${LDFLAGS}" -o "../${OUTDIR}/qew${SUFFIX}" ./cmd/qew/
          cd ..

      - name: Create archive
        run: |
          cd dist
          DIR="james-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${DIR}.zip" "${DIR}/"
          else
            tar czf "${DIR}.tar.gz" "${DIR}/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: james-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/james-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: James v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*
